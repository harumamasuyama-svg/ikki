<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#17120d">
  <title>農民一揆</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon-180.png">
  <style>
    :root{color-scheme:dark;--ink:#f8e6a6;--panel:#20160f;--edge:#6b3b1d;--red:#c43d27;--gold:#f5c84b;--green:#5e9d44}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
    html,body{height:100%;margin:0;background:#0f0d0b;color:var(--ink);font-family:ui-monospace,Menlo,Consolas,"Noto Sans JP",monospace;overflow:hidden}
    body{display:grid;place-items:center;background:radial-gradient(circle at 50% 25%,#332417 0,#15100d 58%,#070606 100%)}
    #wrap{position:relative;width:min(100vw,56.25vh);height:min(177.78vw,100vh);max-width:430px;max-height:764px;aspect-ratio:9/16;background:#000;box-shadow:0 0 0 4px #3b2315,0 18px 40px #000;border-radius:8px;overflow:hidden}
    canvas{width:100%;height:100%;display:block;image-rendering:pixelated;background:#000;touch-action:none}
    #touch{position:absolute;inset:auto 0 10px 0;display:flex;justify-content:flex-end;align-items:flex-end;padding:0 14px;pointer-events:none;z-index:4}
    .cluster{display:none;gap:10px;pointer-events:auto}.btn{width:58px;height:58px;border:3px solid #7a4b25;background:#21150c;color:#f8e6a6;font-weight:900;font-size:24px;box-shadow:inset 0 0 0 3px #000,0 4px 0 #090604;display:grid;place-items:center;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}.btn:active,.btn.down{background:#7a2b1d;color:#fff}.shield{width:78px;font-size:18px;pointer-events:auto;position:relative;z-index:6}
    #pauseBtn{position:absolute;right:10px;top:8px;width:42px;height:34px;border:3px solid #7a4b25;background:#21150c;color:#f8e6a6;font-weight:900;font-size:18px;box-shadow:inset 0 0 0 2px #000;display:none;place-items:center;z-index:4;touch-action:none}
    #pauseMenu{position:absolute;inset:0;display:none;place-items:center;background:rgba(0,0,0,.48);z-index:5}
    #pauseMenu.show{display:grid}.menuBox{width:230px;border:4px solid #7a4b25;background:#17120d;padding:18px;box-shadow:inset 0 0 0 3px #000,0 10px 0 #090604;text-align:center}.menuTitle{font-size:24px;font-weight:900;color:#f5c84b;text-shadow:2px 2px #000;margin-bottom:14px}.menuBtn{width:100%;height:44px;margin-top:10px;border:3px solid #7a4b25;background:#2a1b12;color:#f8e6a6;font-weight:900;font-size:17px;box-shadow:inset 0 0 0 2px #000}.menuBtn:active{background:#7a2b1d;color:#fff}
  </style>
</head>
<body>
  <main id="wrap" aria-label="農民一揆 game">
    <canvas id="game" width="360" height="640"></canvas>
    <button id="pauseBtn" aria-label="一時停止">II</button>
    <div id="pauseMenu" aria-label="一時停止メニュー">
      <div class="menuBox">
        <div class="menuTitle">一時停止</div>
        <button id="resumeBtn" class="menuBtn">再開</button>
        <button id="titleBtn" class="menuBtn">タイトルへ戻る</button>
      </div>
    </div>
    <div id="touch">
      <div class="cluster"><button id="left" class="btn" aria-label="左">◀</button><button id="right" class="btn" aria-label="右">▶</button></div>
      <button id="guard" class="btn shield" aria-label="防御">盾</button>
    </div>
  </main>
<script>
(() => {
  'use strict';
  // 360x640 の仮想解像度で固定し、CSS 側で縦画面に拡大します。
  const W=360,H=640, canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
  const pauseBtn=document.getElementById('pauseBtn'), pauseMenu=document.getElementById('pauseMenu'), resumeBtn=document.getElementById('resumeBtn'), titleBtn=document.getElementById('titleBtn');
  ctx.imageSmoothingEnabled=false;
  const art={title:new Image(),gameplay:new Image(),hero:new Image(),enemyItems:new Image(),stageBgs:[],titleReady:false,gameplayReady:false,heroReady:false,enemyItemsReady:false};
  art.title.onload=()=>art.titleReady=true; art.gameplay.onload=()=>art.gameplayReady=true; art.hero.onload=()=>art.heroReady=true; art.enemyItems.onload=()=>art.enemyItemsReady=true;
  art.title.src='assets/generated-title-bg.png'; art.gameplay.src='assets/generated-gameplay-bg.png'; art.hero.src='assets/hero-back-sprite.png'; art.enemyItems.src='assets/enemy-item-sprite.png';
  const stageBgFiles=['assets/generated-gameplay-morning.png','assets/generated-gameplay-day.png','assets/generated-gameplay-evening.png','assets/generated-gameplay-night.png','assets/generated-gameplay-boss.png'];
  art.stageBgs=stageBgFiles.map(src=>{const img=new Image(); img.onload=()=>img.ready=true; img.src=src; return img;});
  const enemyItemRects={
    bandit:[9,268,170,224], samurai:[197,239,151,249], armor:[386,204,160,286], archer:[573,250,171,238], horse:[771,98,165,409], boss:[943,187,338,347],
    spearItem:[1313,190,58,308], candleItem:[1385,293,101,195], coinItem:[1510,305,87,173], thunderItem:[1630,281,92,202], supportItem:[1748,224,103,268],
    axeShot:[1865,324,95,151], sickleShot:[1987,302,83,176], arrowShot:[2104,288,32,190]
  };
  function enemyItemSprite(name,x,y,scale=.18){
    if(!art.enemyItemsReady) return false;
    const r=enemyItemRects[name];
    if(!r) return false;
    const [sx,sy,sw,sh]=r;
    const dw=sw*scale;
    const dh=sh*scale;
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(art.enemyItems,sx,sy,sw,sh,Math.round(x-dw/2),Math.round(y-dh/2),Math.round(dw),Math.round(dh));
    return true;
  }
  function sheetSprite(name,x,y,scale=1){
    const aliases={guard:null,farmer:null,samurai:'samurai',bandit:'bandit',archer:'archer',horse:'horse',boss:'boss',spearItem:'spearItem',candleItem:'candleItem',coinItem:'coinItem',thunderItem:'thunderItem',supportItem:'supportItem',axeShot:'axeShot',sickleShot:'sickleShot',arrowShot:'arrowShot'};
    const mapped=aliases[name] ?? name;
    if(!mapped) return false;
    return enemyItemSprite(mapped,x,y,scale*.26);
  }
  function heroSprite(pose,x,y,scale=.16){ if(!art.heroReady)return false; const iw=art.hero.naturalWidth||art.hero.width, ih=art.hero.naturalHeight||art.hero.height, sw=iw/4, sx=pose*sw, sizeW=sw*scale, sizeH=ih*scale; ctx.drawImage(art.hero,sx,0,sw,ih,Math.round(x-sizeW/2),Math.round(y-sizeH/2),sizeW,sizeH); return true; }
  function drawCoverImage(img){ const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height; if(!iw||!ih)return false; const scale=Math.max(W/iw,H/ih), sw=W/scale, sh=H/scale, sx=(iw-sw)/2, sy=(ih-sh)/2; ctx.drawImage(img,sx,sy,sw,sh,0,0,W,H); return true; }
  const rand=(a,b)=>a+Math.random()*(b-a), clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const keys={left:false,right:false,guard:false};
  const game={mode:'title',score:0,hi:Number(localStorage.nouminHi||0),stage:1,loop:1,candles:5,time:60,thunderStock:1,thunderMax:3,shake:0,flash:0,fail:0,stageIntro:0,stageText:'',overText:'',weapon:'axe',weaponTimer:0,attackTimer:0,spawn:0,shot:0,boss:null,complete:false,bgmStage:0,audio:null,musicTimer:0,lightning:0,bolts:[]};
  const player={x:180,y:535,w:24,h:26,speed:190,inv:0,touchX:null};
  const enemies=[],shots=[],enemyShots=[],items=[],sparks=[],supporters=[];
  function supportLimit(){ return game.loop>=2?3:2; }
  function updateLoopCaps(){ game.thunderMax=game.loop>=2?5:3; game.thunderStock=Math.min(game.thunderStock,game.thunderMax); }
  // 敵の基本性能。種類追加やバランス調整はここから行えます。
  const enemyDefs={
    bandit:{name:'野盗',hp:1,spd:35,score:80,color:'#8f3b2c',kind:0},
    samurai:{name:'野武士',hp:2,spd:34,score:140,color:'#646e7b',kind:1},
    archer:{name:'弓兵',hp:1,spd:24,score:160,color:'#b78332',kind:2,shoot:1.8},
    horse:{name:'騎馬武者',hp:3,spd:58,score:260,color:'#6b3d24',kind:3}
  };
  const stageLooks=[
    {sky:'#24385a',ridge:'#314f4f',hillA:'#203f34',hillB:'#27493d',field:'#4f8a38',field2:'#6da34b',road:'#b5793f',road2:'#c18447',hut:'#5a2d18',roof:'#351b12',rice:'#d4c266',ground:'#2a1b12',gate:'#3c2415',name:'春の田畑'},
    {sky:'#31506a',ridge:'#42644d',hillA:'#2c583a',hillB:'#386b3e',field:'#6f9f37',field2:'#8bb34a',road:'#a76d38',road2:'#bc8149',hut:'#66391d',roof:'#3c2114',rice:'#efd56e',ground:'#322016',gate:'#4a2b17',name:'夏の稲穂'},
    {sky:'#5a3d48',ridge:'#5d5140',hillA:'#5d6335',hillB:'#746437',field:'#8d8a36',field2:'#b69a43',road:'#9c6035',road2:'#bd7040',hut:'#5b2c1a',roof:'#2e1811',rice:'#e8bd55',ground:'#2b1a13',gate:'#442617',name:'夕焼け村'},
    {sky:'#1e2847',ridge:'#293e49',hillA:'#1b3d3a',hillB:'#244945',field:'#3f7440',field2:'#5b8c4e',road:'#7f5b42',road2:'#9c704b',hut:'#4d2718',roof:'#24130f',rice:'#b7c068',ground:'#211712',gate:'#342117',name:'夜明け前'},
    {sky:'#19172b',ridge:'#332640',hillA:'#251d32',hillB:'#3a2630',field:'#3c553a',field2:'#5d6740',road:'#704530',road2:'#8c5638',hut:'#3e1b15',roof:'#160c0a',rice:'#9c8f54',ground:'#1a1110',gate:'#2b1713',name:'落ち武者の砦'}
  ];
  const palettes=stageLooks[0];
  let last=performance.now();
  function initAudio(){ if(game.audio) return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return; game.audio=new AC(); }
  function tone(freq,dur,type='square',gain=.05){ initAudio(); if(!game.audio) return; const t=game.audio.currentTime,o=game.audio.createOscillator(),g=game.audio.createGain(); o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.connect(g);g.connect(game.audio.destination);o.start(t);o.stop(t+dur); }
  function sfx(n){ const map={atk:[620,.04],hit:[170,.08],item:[880,.08],thunder:[90,.35,'sawtooth',.12],fail:[110,.25],over:[70,.5],clear:[660,.12]}; const a=map[n]; if(!a)return; tone(a[0],a[1],a[2]||'square',a[3]||.06); if(n==='clear'){setTimeout(()=>tone(880,.14),100);setTimeout(()=>tone(1180,.2),230);} }
  function music(dt){ if(game.mode!=='play'||game.fail>0)return; game.musicTimer-=dt; if(game.musicTimer>0)return; const tracks=[[294,392,440,392],[330,440,494,440],[262,392,523,392],[349,466,523,466],[196,294,392,494]]; const seq=tracks[game.stage-1]||tracks[0]; const i=Math.floor(performance.now()/160)%seq.length; tone(seq[i]*(game.loop===2?1.08:1),.07,'square',.025); game.musicTimer=.16; }
  function newRun(){ supporters.length=0; Object.assign(game,{mode:'play',score:0,stage:1,loop:1,candles:5,time:60,thunderStock:1,thunderMax:3,fail:0,stageIntro:0,stageText:'',overText:'',weapon:'axe',weaponTimer:0,attackTimer:0,spawn:0,shot:0,boss:null,complete:false}); updateLoopCaps(); setPaused(false); resetStage(true); }
  function startStageIntro(){ const look=stageLooks[game.stage-1]||stageLooks[0]; game.stageIntro=1.25; game.stageText=(game.stage===5?'最終面':'第'+game.stage+'面')+'  '+look.name; }
  function resetStage(showIntro=false){ enemies.length=shots.length=enemyShots.length=items.length=sparks.length=supporters.length=0; game.time=60; game.candles=5; game.spawn=0; game.shot=0; player.x=180; player.touchX=null; player.inv=0; if(game.stage===5) spawnBoss(); if(showIntro)startStageIntro(); }
  function nextStage(){ sfx('clear'); game.stage++; if(game.stage>5){ if(game.loop===1){game.mode='ending'; game.hi=Math.max(game.hi,game.score); localStorage.nouminHi=game.hi; setPaused(false);} else {game.mode='complete'; game.hi=Math.max(game.hi,game.score); localStorage.nouminHi=game.hi;} } else resetStage(true); }
  function startSecondLoop(){ game.loop=2; game.stage=1; game.mode='play'; updateLoopCaps(); game.thunderStock=Math.max(game.thunderStock,2); resetStage(true); }
  function spawnBoss(){ game.boss={x:180,y:70,w:68,h:68,hp:70+(game.loop-1)*45,max:70+(game.loop-1)*45,t:0,dir:1,atk:1.2}; }
  // ステージごとの出現テーブルから敵を作ります。後から波制御に差し替えやすい入口です。
  function spawnEnemy(){ const pool=game.stage===1?['bandit','bandit','samurai']:game.stage===2?['bandit','bandit','bandit','samurai','samurai','archer']:game.stage===3?['bandit','bandit','samurai','samurai','horse','archer']:['bandit','bandit','samurai','samurai','samurai','archer','horse']; const type=pool[Math.floor(Math.random()*pool.length)], d=enemyDefs[type]; const scale=1+(game.stage-1)*.13+(game.loop-1)*.45; enemies.push({type,x:rand(28,332),y:-20,w:type==='horse'?30:22,h:type==='horse'?28:24,hp:Math.ceil(d.hp*scale),max:Math.ceil(d.hp*scale),spd:d.spd*(1+(game.stage-1)*.08+(game.loop-1)*.25),cool:rand(.6,2),color:d.color,score:d.score}); }
  function fire(){ if(keys.guard||game.fail>0)return; game.shot-=1/60; if(game.shot>0)return; game.shot=game.weapon==='spear'?.28:.38; const pattern=game.weapon==='spear'?[[-115,-255],[0,-295],[115,-255]]:[[0,-285]]; for(const [vx,vy] of pattern) shots.push({x:player.x,y:player.y-16,vx,vy,w:5,h:13,kind:game.weapon}); game.attackTimer=.18; sfx('atk'); }
  function addSupporter(){ if(supporters.length>=supportLimit())return; const slots=game.loop>=2?[{dx:-72,dy:-10},{dx:72,dy:-10},{dx:0,dy:-48}]:[{dx:-72,dy:-10},{dx:72,dy:-10}]; const used=new Set(supporters.map(s=>s.slot)); const idx=slots.findIndex((_,i)=>!used.has(i)); const slot=idx<0?0:idx, f=slots[slot]; supporters.push({slot,dx:f.dx,dy:f.dy,x:player.x+f.dx,y:player.y+f.dy,w:22,h:26,shot:rand(.05,.35)}); }
  function fireSupporters(dt){ for(const s of supporters){ s.shot-=dt; if(s.shot<=0){ s.shot=.52; shots.push({x:s.x,y:s.y-20,vx:0,vy:-245,w:14,h:12,kind:'sickle'}); tone(540,.035,'square',.025); } } }
  function makeLightningBolts(){
    const bolts=[];
    for(let b=0;b<7;b++){
      const pts=[]; let x=rand(28,332), y=-20; pts.push([x,y]);
      const targetY=rand(270,560), drift=rand(-70,70);
      for(let i=1;i<8;i++){ const p=i/7; pts.push([clamp(x+drift*p+rand(-28,28),8,352), -20+(targetY+20)*p]); }
      bolts.push(pts);
    }
    return bolts;
  }
  function drawLightning(){
    if(!game.lightning)return;
    const a=clamp(game.lightning/.75,0,1), flicker=.55+.45*Math.sin(performance.now()/34);
    px(0,0,W,H,'rgba(210,235,255,'+(.12*a*flicker)+')');
    ctx.save(); ctx.lineCap='square'; ctx.lineJoin='miter';
    for(const pts of game.bolts){
      ctx.globalAlpha=.95*a; ctx.strokeStyle='#ffffff'; ctx.lineWidth=3; ctx.beginPath(); pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1])); ctx.stroke();
      ctx.globalAlpha=.75*a; ctx.strokeStyle='#7de0ff'; ctx.lineWidth=7; ctx.beginPath(); pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1])); ctx.stroke();
      for(let i=2;i<pts.length-2;i+=2){ const p=pts[i]; ctx.globalAlpha=.55*a; ctx.strokeStyle='#fff36d'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(p[0],p[1]); ctx.lineTo(clamp(p[0]+rand(-45,45),0,W),p[1]+rand(26,60)); ctx.stroke(); }
    }
    ctx.restore();
  }
  // 必殺技: 防御ボタン5連打で、ボス以外を消す雷を発動します。
  function thunder(){ if(game.thunderStock<=0||game.mode!=='play'||game.fail>0||game.stageIntro>0)return; game.thunderStock--; game.flash=.55; game.lightning=.75; game.bolts=makeLightningBolts(); game.shake=10; for(let i=enemies.length-1;i>=0;i--){ game.score+=30; pop(enemies[i].x,enemies[i].y,'#f9f36d'); enemies.splice(i,1); } sfx('thunder'); }
  let guardTaps=[]; function tapGuard(){ const now=performance.now(); guardTaps=guardTaps.filter(t=>now-t<1200); guardTaps.push(now); if(guardTaps.length>=5){guardTaps=[];thunder();} }
  function damage(){ if(game.fail>0||player.inv>0)return; game.candles--; player.inv=1.2; game.shake=12; game.fail=.8; game.overText=game.candles<=0?'ゲームオーバー':'失敗'; sfx(game.candles<=0?'over':'fail'); if(game.candles<=0){ setTimeout(()=>{game.shake=0;game.fail=0;game.mode='gameover';game.hi=Math.max(game.hi,game.score);localStorage.nouminHi=game.hi;},850); } }
  // 撃破時アイテム。確率をここで調整できます。
  function drop(x,y,forceType=null){ const add=(type,vy,life,w=28,h=28)=>items.push({type,x,y,vy,t:0,life,w,h}); if(forceType==='candle'){add('candle',50,5,30,34);return;} const r=Math.random(); if(r<.16)add('spear',45,9,34,42); else if(r<.30)add('candle',50,5,30,34); else if(game.stage>=3&&supporters.length<3&&r<.39)add('support',46,9,34,34); else if(r<.405)add('thunder',42,99,34,34); else if(r<.55)add('coin',50,8,34,34); }
  function pop(x,y,c){ for(let i=0;i<9;i++) sparks.push({x,y,vx:rand(-45,45),vy:rand(-65,20),t:.35,c}); }
  function rect(a,b){return Math.abs(a.x-b.x)*2<a.w+b.w && Math.abs(a.y-b.y)*2<a.h+b.h}
  function update(dt){ music(dt); if(game.mode!=='play')return; if(game.stageIntro>0){game.stageIntro-=dt; if(game.stageIntro<0)game.stageIntro=0; return;} if(game.fail>0){game.fail-=dt; game.shake=Math.max(0,game.shake-60*dt); if(game.fail<=0)game.shake=0; return;} game.time-=dt; player.inv=Math.max(0,player.inv-dt); game.flash=Math.max(0,game.flash-dt); game.lightning=Math.max(0,(game.lightning||0)-dt); game.shake=Math.max(0,game.shake-60*dt); game.weaponTimer=Math.max(0,game.weaponTimer-dt); game.attackTimer=Math.max(0,game.attackTimer-dt); if(game.weaponTimer<=0)game.weapon='axe'; if(player.touchX!=null){ const dx=player.touchX-player.x; player.x+=clamp(dx,-player.speed*1.35*dt,player.speed*1.35*dt); } else { player.x+=((keys.right?1:0)-(keys.left?1:0))*player.speed*dt; } player.x=clamp(player.x,28,332); supporters.forEach(s=>{s.x=clamp(player.x+s.dx,28,332);s.y=player.y+s.dy;}); fire(); fireSupporters(dt); shots.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt}); enemyShots.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.spin=(s.spin||0)+dt*10}); items.forEach(it=>{it.y+=it.vy*dt;it.t+=dt;it.life-=dt}); sparks.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=120*dt;p.t-=dt});
    if(game.stage<5){ game.spawn-=dt; const rate=Math.max(.38,1.25-(game.stage*.14)-(game.loop-1)*.35); if(game.spawn<=0){spawnEnemy();game.spawn=rand(rate*.55,rate*1.2);} if(game.time<=0)nextStage(); }

      else if(s.kind==='axe'&&sheetSprite('axeShot',s.x,s.y,0.34)){}
      else {
        if(s.kind==='sickle'){px(s.x-8,s.y-4,16,5,'#d9d9c9');px(s.x+2,s.y-10,5,15,'#f1f1dc');px(s.x-7,s.y+2,9,3,'#8a8a78');}
        else {px(s.x-2,s.y-8,4,16,'#c8d0c8');px(s.x-7,s.y-8,14,6,'#b9c0b8');px(s.x-4,s.y-12,8,4,'#eef2dd')}
      }
    }); enemyShots.forEach(s=>{ if(s.type==='bolt'){px(s.x-4,s.y-8,8,16,'#bfe8ff');px(s.x-1,s.y-13,3,26,'#ffffff')} else if(s.type==='fire'){px(s.x-5,s.y-7,10,14,'#ff7a32');px(s.x-2,s.y-11,5,9,'#f9f36d')} else if(!enemyItemSprite('arrowShot',s.x,s.y,.20)){px(s.x-s.w/2,s.y-s.h/2,s.w,s.h,'#d9c06b');px(s.x-1,s.y-8,2,16,'#fff0b2')} }); items.forEach(drawItem); sparks.forEach(p=>px(p.x,p.y,3,3,p.c)); supporters.forEach(drawSupporter); drawPlayer(); drawCandles(); ctx.restore(); panel(0,0,W,58); panel(6,6,132,42);panel(144,6,72,42);panel(222,6,92,50); text('SCORE '+String(game.score).padStart(6,'0'),12,21,12); text('面 '+game.stage+'  周 '+game.loop,12,41,13); text(game.stage===5?'BOSS':'TIME '+Math.max(0,Math.ceil(game.time)),180,31,13,'#f5c84b','center'); text('雷 x'+game.thunderStock+'/'+game.thunderMax,268,24,12,game.thunderStock>0?'#aee8ff':'#7b6b55','center'); text('盾連打で発動!',268,42,9,'#f8e6a6','center'); if(game.weapon==='spear')text('竹やり '+Math.ceil(game.weaponTimer),290,38,12,'#d9d06b','center'); if(game.stageIntro>0){ panel(28,232,304,118); px(42,246,276,3,'#f5c84b');px(42,330,276,3,'#090604'); text(game.stageText,180,282,24,'#f5c84b','center'); text(game.loop+'周目',180,318,17,'#ffffff','center'); } if(game.flash>0){px(0,0,W,H,'rgba(245,245,190,.35)');} drawLightning(); if(game.fail>0){text(game.overText,180,320,42,game.candles<=0?'#ff4b32':'#ffffff','center');} }
  function drawTitle(){ if(art.titleReady)drawCoverImage(art.title); else drawBg(); px(0,0,W,H,'rgba(0,0,0,.12)'); text('農民一揆',184,98,46,'#090604','center'); text('農民一揆',181,95,46,'#7a2418','center'); text('農民一揆',180,90,46,'#f5c84b','center'); text('N O U M I N   I K K I',180,128,13,'#fff0b2','center'); panel(78,370,204,104); text('ゲームスタート',180,410,20,Math.floor(performance.now()/360)%2?'#f5c84b':'#ffffff','center'); text('ハイスコア '+game.hi,180,448,16,'#f8e6a6','center'); text('画面タップ または Enter',180,526,14,'#ffffff','center'); }
  function drawGameOver(){ render(); px(22,208,316,180,'rgba(18,12,8,.88)'); text('ゲームオーバー',180,260,32,'#ff4b32','center'); text('SCORE '+game.score,180,304,18,'#f8e6a6','center'); text('Enter / Tap でタイトル',180,348,15,'#f5c84b','center'); }
  function drawEnding(){ drawBg(); px(0,0,W,H,'rgba(0,0,0,.22)'); text('一周目クリア',180,188,32,'#f5c84b','center'); text('農民たちは夜明けまで村を守った',180,244,15,'#ffffff','center'); text('しかし落ち武者の怨念は残る',180,276,15,'#d9c06b','center'); text('SCORE '+game.score,180,330,18,'#f8e6a6','center'); text('Tap / Enter で二周目へ',180,390,16,'#f5c84b','center'); }
  function drawComplete(){ drawBg(); text('完全クリア',180,214,38,'#f5c84b','center'); text('農村は守られた',180,270,20,'#ffffff','center'); text('SCORE '+game.score,180,316,18,'#f8e6a6','center'); text('Enter / Tap でタイトル',180,372,15,'#f5c84b','center'); }
  function loop(now){ const dt=Math.min(.033,(now-last)/1000); last=now; pauseBtn.style.display=(game.mode==='play'||game.mode==='paused')?'grid':'none'; if(game.mode!=='paused')update(dt); if(game.mode==='title')drawTitle(); else if(game.mode==='gameover')drawGameOver(); else if(game.mode==='ending')drawEnding(); else if(game.mode==='complete')drawComplete(); else render(); requestAnimationFrame(loop); }
  function setPaused(on){ pauseMenu.classList.toggle('show',on); pauseBtn.textContent=on?'▶':'II'; pauseBtn.setAttribute('aria-label',on?'再開':'一時停止'); }
  function pauseGame(){ if(game.mode!=='play')return; game.mode='paused'; setPaused(true); }
  function resumeGame(){ if(game.mode!=='paused')return; game.mode='play'; setPaused(false); last=performance.now(); }
  function backToTitle(){ enemies.length=shots.length=enemyShots.length=items.length=sparks.length=supporters.length=0; player.touchX=null; game.shake=0; game.fail=0; game.mode='title'; setPaused(false); }
  function startOrBack(){ initAudio(); if(game.audio?.state==='suspended')game.audio.resume(); if(game.mode==='title')newRun(); else if(game.mode==='ending')startSecondLoop(); else if(game.mode==='gameover'||game.mode==='complete')game.mode='title'; }
  addEventListener('keydown',e=>{ if(e.key==='ArrowLeft')keys.left=true; if(e.key==='ArrowRight')keys.right=true; if(e.code==='Space'&&!keys.guard&&game.mode==='play'){keys.guard=true;tapGuard();} if(e.key==='Enter')startOrBack(); if(e.key==='Escape'){ game.mode==='paused'?resumeGame():pauseGame(); } });
  addEventListener('keyup',e=>{ if(e.key==='ArrowLeft')keys.left=false; if(e.key==='ArrowRight')keys.right=false; if(e.code==='Space')keys.guard=false; });
  function canvasGameX(e){ const r=canvas.getBoundingClientRect(); return clamp((e.clientX-r.left)*W/r.width,28,332); }
  canvas.addEventListener('pointerdown',e=>{ e.preventDefault(); if(game.mode==='play'){ player.touchX=canvasGameX(e); canvas.setPointerCapture?.(e.pointerId); return; } if(game.mode!=='paused')startOrBack(); });
  canvas.addEventListener('pointermove',e=>{ if(game.mode==='play'&&player.touchX!=null){ e.preventDefault(); player.touchX=canvasGameX(e); } });
  canvas.addEventListener('pointerup',e=>{ if(player.touchX!=null){ e.preventDefault(); player.touchX=null; } });
  canvas.addEventListener('pointercancel',()=>{ player.touchX=null; });
  canvas.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('contextmenu',e=>{ if(e.target.closest('#wrap')) e.preventDefault(); });
  pauseBtn.addEventListener('pointerdown',e=>{e.preventDefault(); initAudio(); game.mode==='paused'?resumeGame():pauseGame();});
  resumeBtn.addEventListener('pointerdown',e=>{e.preventDefault(); resumeGame();});
  titleBtn.addEventListener('pointerdown',e=>{e.preventDefault(); backToTitle();}); ['left','right','guard'].forEach(id=>{ const el=document.getElementById(id); const set=v=>{keys[id]=v;el.classList.toggle('down',v); if(id==='guard'&&v)tapGuard();}; const down=e=>{e.preventDefault();e.stopPropagation();set(true);initAudio();}; const up=e=>{e.preventDefault();e.stopPropagation();set(false);}; el.addEventListener('pointerdown',down); el.addEventListener('pointerup',up); el.addEventListener('pointercancel',up); el.addEventListener('pointerleave',()=>set(false)); el.addEventListener('touchstart',down,{passive:false}); el.addEventListener('touchend',up,{passive:false}); el.addEventListener('touchcancel',up,{passive:false}); el.addEventListener('mousedown',down); el.addEventListener('mouseup',up); });
  requestAnimationFrame(loop);
})();
