<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#17120d">
  <title>農民一揆</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon-180.png">
  <style>
    :root{color-scheme:dark;--ink:#f8e6a6;--panel:#20160f;--edge:#6b3b1d;--red:#c43d27;--gold:#f5c84b;--green:#5e9d44}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
    html,body{height:100%;margin:0;background:#0f0d0b;color:var(--ink);font-family:ui-monospace,Menlo,Consolas,"Noto Sans JP",monospace;overflow:hidden}
    body{display:grid;place-items:center;background:radial-gradient(circle at 50% 25%,#332417 0,#15100d 58%,#070606 100%)}
    #wrap{position:relative;width:min(100vw,56.25vh);height:min(177.78vw,100vh);max-width:430px;max-height:764px;aspect-ratio:9/16;background:#000;box-shadow:0 0 0 4px #3b2315,0 18px 40px #000;border-radius:8px;overflow:hidden}
    canvas{width:100%;height:100%;display:block;image-rendering:pixelated;background:#000;touch-action:none}
    #touch{position:absolute;inset:auto 0 10px 0;display:flex;justify-content:flex-end;align-items:flex-end;padding:0 14px;pointer-events:none}
    .cluster{display:none;gap:10px;pointer-events:auto}.btn{width:58px;height:58px;border:3px solid #7a4b25;background:#21150c;color:#f8e6a6;font-weight:900;font-size:24px;box-shadow:inset 0 0 0 3px #000,0 4px 0 #090604;display:grid;place-items:center;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}.btn:active,.btn.down{background:#7a2b1d;color:#fff}.shield{width:78px;font-size:18px}
    #pauseBtn{position:absolute;right:10px;top:8px;width:42px;height:34px;border:3px solid #7a4b25;background:#21150c;color:#f8e6a6;font-weight:900;font-size:18px;box-shadow:inset 0 0 0 2px #000;display:none;place-items:center;z-index:4;touch-action:none}
    #pauseMenu{position:absolute;inset:0;display:none;place-items:center;background:rgba(0,0,0,.48);z-index:5}
    #pauseMenu.show{display:grid}.menuBox{width:230px;border:4px solid #7a4b25;background:#17120d;padding:18px;box-shadow:inset 0 0 0 3px #000,0 10px 0 #090604;text-align:center}.menuTitle{font-size:24px;font-weight:900;color:#f5c84b;text-shadow:2px 2px #000;margin-bottom:14px}.menuBtn{width:100%;height:44px;margin-top:10px;border:3px solid #7a4b25;background:#2a1b12;color:#f8e6a6;font-weight:900;font-size:17px;box-shadow:inset 0 0 0 2px #000}.menuBtn:active{background:#7a2b1d;color:#fff}
  </style>
</head>
<body>
  <main id="wrap" aria-label="農民一揆 game">
    <canvas id="game" width="360" height="640"></canvas>
    <button id="pauseBtn" aria-label="一時停止">II</button>
    <div id="pauseMenu" aria-label="一時停止メニュー">
      <div class="menuBox">
        <div class="menuTitle">一時停止</div>
        <button id="resumeBtn" class="menuBtn">再開</button>
        <button id="titleBtn" class="menuBtn">タイトルへ戻る</button>
      </div>
    </div>
    <div id="touch">
      <div class="cluster"><button id="left" class="btn" aria-label="左">◀</button><button id="right" class="btn" aria-label="右">▶</button></div>
      <button id="guard" class="btn shield" aria-label="防御">盾</button>
    </div>
  </main>
<script>
(() => {
  'use strict';
  // 360x640 の仮想解像度で固定し、CSS 側で縦画面に拡大します。
  const W=360,H=640, canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
  const pauseBtn=document.getElementById('pauseBtn'), pauseMenu=document.getElementById('pauseMenu'), resumeBtn=document.getElementById('resumeBtn'), titleBtn=document.getElementById('titleBtn');
  ctx.imageSmoothingEnabled=false;
  const rand=(a,b)=>a+Math.random()*(b-a), clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const keys={left:false,right:false,guard:false};
  const game={mode:'title',score:0,hi:Number(localStorage.nouminHi||0),stage:1,loop:1,candles:5,time:60,thunderStock:1,thunderMax:3,shake:0,flash:0,fail:0,stageIntro:0,stageText:'',overText:'',weapon:'axe',weaponTimer:0,spawn:0,shot:0,boss:null,complete:false,bgmStage:0,audio:null,musicTimer:0};
  const player={x:180,y:535,w:24,h:26,speed:190,inv:0,touchX:null};
  const enemies=[],shots=[],enemyShots=[],items=[],sparks=[];
  // 敵の基本性能。種類追加やバランス調整はここから行えます。
  const enemyDefs={
    bandit:{name:'野盗',hp:1,spd:35,score:80,color:'#8f3b2c',kind:0},
    samurai:{name:'野武士',hp:2,spd:34,score:140,color:'#646e7b',kind:1},
    archer:{name:'弓兵',hp:1,spd:24,score:160,color:'#b78332',kind:2,shoot:1.8},
    horse:{name:'騎馬武者',hp:3,spd:58,score:260,color:'#6b3d24',kind:3}
  };
  const stageLooks=[
    {sky:'#24385a',ridge:'#314f4f',hillA:'#203f34',hillB:'#27493d',field:'#4f8a38',field2:'#6da34b',road:'#b5793f',road2:'#c18447',hut:'#5a2d18',roof:'#351b12',rice:'#d4c266',ground:'#2a1b12',gate:'#3c2415',name:'春の田畑'},
    {sky:'#31506a',ridge:'#42644d',hillA:'#2c583a',hillB:'#386b3e',field:'#6f9f37',field2:'#8bb34a',road:'#a76d38',road2:'#bc8149',hut:'#66391d',roof:'#3c2114',rice:'#efd56e',ground:'#322016',gate:'#4a2b17',name:'夏の稲穂'},
    {sky:'#5a3d48',ridge:'#5d5140',hillA:'#5d6335',hillB:'#746437',field:'#8d8a36',field2:'#b69a43',road:'#9c6035',road2:'#bd7040',hut:'#5b2c1a',roof:'#2e1811',rice:'#e8bd55',ground:'#2b1a13',gate:'#442617',name:'夕焼け村'},
    {sky:'#1e2847',ridge:'#293e49',hillA:'#1b3d3a',hillB:'#244945',field:'#3f7440',field2:'#5b8c4e',road:'#7f5b42',road2:'#9c704b',hut:'#4d2718',roof:'#24130f',rice:'#b7c068',ground:'#211712',gate:'#342117',name:'夜明け前'},
    {sky:'#19172b',ridge:'#332640',hillA:'#251d32',hillB:'#3a2630',field:'#3c553a',field2:'#5d6740',road:'#704530',road2:'#8c5638',hut:'#3e1b15',roof:'#160c0a',rice:'#9c8f54',ground:'#1a1110',gate:'#2b1713',name:'落ち武者の砦'}
  ];
  const palettes=stageLooks[0];
  let last=performance.now();
  function initAudio(){ if(game.audio) return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return; game.audio=new AC(); }
  function tone(freq,dur,type='square',gain=.05){ initAudio(); if(!game.audio) return; const t=game.audio.currentTime,o=game.audio.createOscillator(),g=game.audio.createGain(); o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.connect(g);g.connect(game.audio.destination);o.start(t);o.stop(t+dur); }
  function sfx(n){ const map={atk:[620,.04],hit:[170,.08],item:[880,.08],thunder:[90,.35,'sawtooth',.12],fail:[110,.25],over:[70,.5],clear:[660,.12]}; const a=map[n]; if(!a)return; tone(a[0],a[1],a[2]||'square',a[3]||.06); if(n==='clear'){setTimeout(()=>tone(880,.14),100);setTimeout(()=>tone(1180,.2),230);} }
  function music(dt){ if(game.mode!=='play'||game.fail>0)return; game.musicTimer-=dt; if(game.musicTimer>0)return; const tracks=[[294,392,440,392],[330,440,494,440],[262,392,523,392],[349,466,523,466],[196,294,392,494]]; const seq=tracks[game.stage-1]||tracks[0]; const i=Math.floor(performance.now()/160)%seq.length; tone(seq[i]*(game.loop===2?1.08:1),.07,'square',.025); game.musicTimer=.16; }
  function newRun(){ Object.assign(game,{mode:'play',score:0,stage:1,loop:1,candles:5,time:60,thunderStock:1,thunderMax:3,fail:0,stageIntro:0,stageText:'',overText:'',weapon:'axe',weaponTimer:0,spawn:0,shot:0,boss:null,complete:false}); setPaused(false); resetStage(true); }
  function startStageIntro(){ const look=stageLooks[game.stage-1]||stageLooks[0]; game.stageIntro=1.25; game.stageText=(game.stage===5?'最終面':'第'+game.stage+'面')+'  '+look.name; }
  function resetStage(showIntro=false){ enemies.length=shots.length=enemyShots.length=items.length=sparks.length=0; game.time=60; game.candles=5; game.spawn=0; game.shot=0; player.x=180; player.touchX=null; player.inv=0; if(game.stage===5) spawnBoss(); if(showIntro)startStageIntro(); }
  function nextStage(){ sfx('clear'); game.stage++; if(game.stage>5){ if(game.loop===1){game.loop=2;game.stage=1; resetStage(true);} else {game.mode='complete'; game.hi=Math.max(game.hi,game.score); localStorage.nouminHi=game.hi;} } else resetStage(true); }
  function spawnBoss(){ game.boss={x:180,y:70,w:68,h:68,hp:70+(game.loop-1)*45,max:70+(game.loop-1)*45,t:0,dir:1,atk:1.2}; }
  // ステージごとの出現テーブルから敵を作ります。後から波制御に差し替えやすい入口です。
  function spawnEnemy(){ const pool=game.stage===1?['bandit','bandit','samurai']:game.stage===2?['bandit','bandit','bandit','samurai','samurai','archer']:game.stage===3?['bandit','bandit','samurai','samurai','horse','archer']:['bandit','samurai','samurai','horse','horse','archer']; const type=pool[Math.floor(Math.random()*pool.length)], d=enemyDefs[type]; const scale=1+(game.stage-1)*.13+(game.loop-1)*.45; enemies.push({type,x:rand(28,332),y:-20,w:type==='horse'?30:22,h:type==='horse'?28:24,hp:Math.ceil(d.hp*scale),max:Math.ceil(d.hp*scale),spd:d.spd*(1+(game.stage-1)*.08+(game.loop-1)*.25),cool:rand(.6,2),color:d.color,score:d.score}); }
  function fire(){ if(keys.guard||game.fail>0)return; game.shot-=1/60; if(game.shot>0)return; game.shot=game.weapon==='spear'?.28:.38; const pattern=game.weapon==='spear'?[[-115,-255],[0,-295],[115,-255]]:[[0,-285]]; for(const [vx,vy] of pattern) shots.push({x:player.x,y:player.y-16,vx,vy,w:5,h:13,kind:game.weapon}); sfx('atk'); }
  // 必殺技: 防御ボタン5連打で、ボス以外を消す雷を発動します。
  function thunder(){ if(game.thunderStock<=0||game.mode!=='play'||game.fail>0||game.stageIntro>0)return; game.thunderStock--; game.flash=.45; for(let i=enemies.length-1;i>=0;i--){ game.score+=30; pop(enemies[i].x,enemies[i].y,'#f9f36d'); enemies.splice(i,1); } sfx('thunder'); }
  let guardTaps=[]; function tapGuard(){ const now=performance.now(); guardTaps=guardTaps.filter(t=>now-t<1200); guardTaps.push(now); if(guardTaps.length>=5){guardTaps=[];thunder();} }
  function damage(){ if(game.fail>0||player.inv>0)return; game.candles--; player.inv=1.2; game.shake=12; game.fail=.8; game.overText=game.candles<=0?'ゲームオーバー':'失敗'; sfx(game.candles<=0?'over':'fail'); if(game.candles<=0){ setTimeout(()=>{game.shake=0;game.fail=0;game.mode='gameover';game.hi=Math.max(game.hi,game.score);localStorage.nouminHi=game.hi;},850); } }
  // 撃破時アイテム。確率をここで調整できます。
  function drop(x,y){ const r=Math.random(); const add=(type,vy,life,w=28,h=28)=>items.push({type,x,y,vy,t:0,life,w,h}); if(r<.08)add('spear',45,9,34,42); else if(r<.15)add('candle',50,5,30,34); else if(r<.22)add('thunder',48,7,34,34); else if(r<.36)add('coin',50,8,34,34); }
  function pop(x,y,c){ for(let i=0;i<9;i++) sparks.push({x,y,vx:rand(-45,45),vy:rand(-65,20),t:.35,c}); }
  function rect(a,b){return Math.abs(a.x-b.x)*2<a.w+b.w && Math.abs(a.y-b.y)*2<a.h+b.h}
  function update(dt){ music(dt); if(game.mode!=='play')return; if(game.stageIntro>0){game.stageIntro-=dt; if(game.stageIntro<0)game.stageIntro=0; return;} if(game.fail>0){game.fail-=dt; game.shake=Math.max(0,game.shake-60*dt); if(game.fail<=0)game.shake=0; return;} game.time-=dt; player.inv=Math.max(0,player.inv-dt); game.flash=Math.max(0,game.flash-dt); game.shake=Math.max(0,game.shake-60*dt); game.weaponTimer=Math.max(0,game.weaponTimer-dt); if(game.weaponTimer<=0)game.weapon='axe'; if(player.touchX!=null){ const dx=player.touchX-player.x; player.x+=clamp(dx,-player.speed*1.35*dt,player.speed*1.35*dt); } else { player.x+=((keys.right?1:0)-(keys.left?1:0))*player.speed*dt; } player.x=clamp(player.x,28,332); fire(); shots.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt}); enemyShots.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.spin+=dt*8}); items.forEach(it=>{it.y+=it.vy*dt;it.t+=dt;it.life-=dt}); sparks.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=120*dt;p.t-=dt});
    if(game.stage<5){ game.spawn-=dt; const rate=Math.max(.38,1.25-(game.stage*.14)-(game.loop-1)*.35); if(game.spawn<=0){spawnEnemy();game.spawn=rand(rate*.55,rate*1.2);} if(game.time<=0)nextStage(); }
    if(game.boss){ const b=game.boss; b.t+=dt;b.atk-=dt;b.x+=Math.sin(b.t*1.7)*32*dt*b.dir; b.x=clamp(b.x,52,308); if(b.atk<=0){ const pat=Math.floor(b.t)%3; if(pat===0){for(let a=-2;a<=2;a++)enemyShots.push({x:b.x,y:b.y+30,vx:a*42,vy:130,w:8,h:14,spin:0,type:'fire'});} else if(pat===1){const bossAim=clamp((player.x-b.x)*0.32,-70,70); enemyShots.push({x:b.x-22,y:b.y+34,vx:bossAim-22,vy:170,w:10,h:16,spin:0,type:'arrow'});enemyShots.push({x:b.x+22,y:b.y+34,vx:bossAim+22,vy:170,w:10,h:16,spin:0,type:'arrow'});} else {for(let i=0;i<6;i++)enemyShots.push({x:rand(30,330),y:110+i*12,vx:0,vy:145,w:9,h:14,spin:0,type:'bolt'});} b.atk=1.25-(game.loop-1)*.2; } }
    for(const e of enemies){ e.y+=e.spd*dt; e.cool-=dt; if(e.type==='archer'&&e.cool<=0&&e.y<430){ const aim=clamp((player.x-e.x)*0.55,-85,85); enemyShots.push({x:e.x,y:e.y+14,vx:aim,vy:135,w:6,h:14,spin:0,type:'arrow'}); e.cool=rand(2.4,3.4); } }
    for(let i=shots.length-1;i>=0;i--){ const s=shots[i]; if(s.y<-30){shots.splice(i,1);continue;} let hit=false; for(let j=enemies.length-1;j>=0;j--){ const e=enemies[j]; if(rect(s,e)){ e.hp--; hit=true; pop(s.x,s.y,'#fff2a0'); if(e.hp<=0){game.score+=enemyDefs[e.type].score;drop(e.x,e.y);pop(e.x,e.y,e.color);enemies.splice(j,1);sfx('hit');} break; } } if(!hit&&game.boss&&rect(s,game.boss)){game.boss.hp--;hit=true;pop(s.x,s.y,'#f9f36d'); if(game.boss.hp<=0){game.score+=5000;game.boss=null;nextStage();}} if(hit)shots.splice(i,1); }
    for(let i=enemies.length-1;i>=0;i--){ const e=enemies[i]; if(e.y>504){ enemies.splice(i,1); damage(); } }
    for(let i=enemyShots.length-1;i>=0;i--){ const s=enemyShots[i]; if(s.y>610){enemyShots.splice(i,1);continue;} if(rect(s,{x:player.x,y:player.y,w:24,h:26})){ if(keys.guard){enemyShots.splice(i,1);pop(player.x,player.y-10,'#aee8ff');tone(250,.05,'square',.04);} else {enemyShots.splice(i,1);damage();} } }
    for(let i=items.length-1;i>=0;i--){ const it=items[i]; if(it.life<=0||it.y>590){items.splice(i,1);continue;} const catchBox={x:player.x,y:player.y,w:58,h:54}; if(rect(it,catchBox)){ if(it.type==='spear'){game.weapon='spear';game.weaponTimer=5;} if(it.type==='candle')game.candles=Math.min(5,game.candles+1); if(it.type==='thunder')game.thunderStock=Math.min(game.thunderMax,game.thunderStock+1); if(it.type==='coin')game.score+=800; items.splice(i,1);sfx('item');pop(player.x,player.y-20,it.type==='thunder'?'#aee8ff':'#f5c84b'); } }
    for(let i=sparks.length-1;i>=0;i--)if(sparks[i].t<=0)sparks.splice(i,1);
  }
  function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}
  function text(t,x,y,size=14,c='#f8e6a6',align='left'){ctx.fillStyle='#000';ctx.font='900 '+size+'px monospace';ctx.textAlign=align;ctx.fillText(t,x+2,y+2);ctx.fillStyle=c;ctx.fillText(t,x,y)}
  function drawBg(){ const p=stageLooks[game.stage-1]||stageLooks[0]; px(0,0,W,H,p.sky); px(0,86,W,120,p.ridge); for(let i=0;i<5;i++)px(i*80-20,120,90,70,i%2?p.hillA:p.hillB); if(game.stage===2){for(let x=24;x<W;x+=70)px(x,72,26,8,'#f4d66a')} if(game.stage===3){px(260,30,42,42,'#e0713a');px(254,36,54,30,'#f0a34a')} if(game.stage===4||game.stage===5){for(let i=0;i<24;i++)px((i*47)%W,20+(i*31)%120,2,2,'#d8d0a0')} px(0,180,W,250,p.field); for(let y=190;y<430;y+=24){px(0,y,W,4,p.field2); for(let x=0;x<W;x+=32)px(x,y+8,12,3,p.rice);} px(132,160,96,368,p.road); px(151,160,58,368,p.road2); if(game.stage===5){for(let y=190;y<470;y+=46){px(126,y,12,8,'#2a1714');px(222,y+18,12,8,'#2a1714')}} for(let x=12;x<340;x+=82){px(x,410,42,34,p.hut);px(x-5,398,52,16,p.roof);px(x+17,430,10,14,'#140b07')} px(0,548,W,92,p.ground); px(70,520,220,34,p.gate); for(let i=0;i<6;i++)px(16+i*62,510,30,20,p.hut); }
  function drawCandles(){ for(let i=0;i<5;i++){ const x=92+i*36,y=562; px(x,y,13,25,i<game.candles?'#fff0b2':'#3b3025'); px(x+3,y+4,7,18,i<game.candles?'#ffd36b':'#191512'); if(i<game.candles){px(x+4,y-9,5,9,'#ff5a2b');px(x+5,y-13,3,6,'#f9f36d');}} }
  function drawPlayer(){ const x=player.x,y=player.y,blink=player.inv>0&&Math.floor(performance.now()/80)%2===0;if(blink)return; px(x-11,y-23,22,7,'#463018');px(x-8,y-28,16,6,'#72512b');px(x-9,y-17,18,14,'#c58d58');px(x-4,y-11,3,3,'#1b120c');px(x+5,y-11,3,3,'#1b120c');px(x-13,y-4,26,24,'#2f5b7a');px(x-10,y-1,20,5,'#67a1b6');px(x-17,y+1,7,19,'#c58d58');px(x+10,y+1,7,19,'#c58d58');px(x-9,y+20,7,15,'#21150c');px(x+2,y+20,7,15,'#21150c');px(x-10,y+34,8,4,'#090604');px(x+1,y+34,8,4,'#090604'); if(keys.guard){px(x-25,y-13,17,34,'#8b6f3a');px(x-21,y-8,9,24,'#d0b65f');px(x-19,y-1,5,8,'#5e4a2b')} else if(game.weapon==='spear'){px(x+16,y-34,4,52,'#d9c06b');px(x+13,y-41,10,10,'#d9d9c9');px(x+14,y-43,8,4,'#ffffff')} else {px(x+14,y-25,14,10,'#b9c0b8');px(x+17,y-15,4,20,'#7b4d25');px(x+21,y-23,5,5,'#eef2dd')} }
  function drawEnemy(e){ const x=e.x,y=e.y; if(e.type==='horse'){px(x-20,y+1,40,16,'#5b351f');px(x-24,y-4,13,12,'#7b4a28');px(x+13,y-7,10,10,'#3a2318');px(x-13,y-18,24,22,e.color);px(x-7,y-28,15,11,'#c59658');px(x-18,y+16,6,15,'#21150c');px(x-3,y+16,6,15,'#21150c');px(x+12,y+16,6,15,'#21150c');px(x-17,y-2,8,4,'#d9c06b');} else {px(x-10,y-12,20,23,e.color);px(x-8,y-23,16,12,'#bd8652');px(x-11,y-29,22,7,e.type==='archer'?'#b78332':'#2b231b');px(x-4,y-18,3,3,'#100a07');px(x+4,y-18,3,3,'#100a07');px(x-13,y+2,5,18,'#bd8652');px(x+8,y+2,5,18,'#bd8652');px(x-8,y+11,6,12,'#21150c');px(x+2,y+11,6,12,'#21150c'); if(e.type==='archer'){px(x+13,y-14,4,29,'#d7b36b');px(x+16,y-12,2,25,'#f6e3a0');px(x-16,y-2,16,4,'#d7b36b')} if(e.type==='samurai'){px(x-14,y-17,4,30,'#c7c7bb');px(x-9,y-31,18,4,'#d0d0c8')} if(e.type==='bandit')px(x-13,y-8,5,11,'#6b251c');} px(x-12,y-34,24,3,'#271713');px(x-12,y-34,24*(e.hp/e.max),3,'#e2d06b'); }
  function drawBoss(b){ const x=b.x,y=b.y; px(x-34,y-22,68,55,'#352331');px(x-24,y-42,48,24,'#8a2f2a');px(x-18,y-52,36,14,'#c7b06a');px(x-18,y-12,36,12,'#c58d58');px(x-8,y-7,5,5,'#f4e4a0');px(x+6,y-7,5,5,'#f4e4a0');px(x-42,y-4,10,42,'#56525a');px(x+32,y-4,10,42,'#56525a');px(50,86,260,8,'#271713');px(50,86,260*(b.hp/b.max),8,'#c43d27');text('落ち武者',180,80,14,'#f5c84b','center');}
  function drawItem(it){ const x=it.x,y=it.y; px(x-13,y-13,26,26,'rgba(255,244,160,.18)'); if(it.type==='spear'){px(x-2,y-19,4,38,'#d9c06b');px(x-6,y-26,12,10,'#d9d9c9');px(x-4,y-28,8,4,'#ffffff')} if(it.type==='candle'){px(x-8,y-5,16,22,'#fff0b2');px(x-5,y+1,10,14,'#ffd36b');px(x-3,y-17,6,12,'#ff5a2b');px(x-1,y-22,3,7,'#f9f36d')} if(it.type==='coin'){px(x-11,y-11,22,22,'#f2c14b');px(x-7,y-7,14,14,'#ffd970');px(x-3,y-8,6,16,'#9b681f')} if(it.type==='thunder'){px(x-4,y-17,8,18,'#fff36d');px(x-10,y-1,12,5,'#fff36d');px(x-1,y+1,7,18,'#aee8ff');px(x-7,y+12,9,5,'#aee8ff')} }
  function render(){ const ox=game.shake?rand(-game.shake,game.shake):0,oy=game.shake?rand(-game.shake,game.shake):0; ctx.save();ctx.translate(ox,oy); drawBg(); enemies.forEach(drawEnemy); if(game.boss)drawBoss(game.boss); shots.forEach(s=>{px(s.x-2,s.y-8,4,16,s.kind==='spear'?'#e7d884':'#c8d0c8'); if(s.kind==='axe')px(s.x-6,s.y-8,12,6,'#b9c0b8')}); enemyShots.forEach(s=>px(s.x-s.w/2,s.y-s.h/2,s.w,s.h,s.type==='bolt'?'#bfe8ff':s.type==='fire'?'#ff7a32':'#d9c06b')); items.forEach(drawItem); sparks.forEach(p=>px(p.x,p.y,3,3,p.c)); drawPlayer(); drawCandles(); ctx.restore(); px(0,0,W,54,'#17120d'); text('SCORE '+String(game.score).padStart(6,'0'),8,18,13); text('面 '+game.stage+'  周 '+game.loop,8,38,13); text(game.stage===5?'BOSS':'TIME '+Math.max(0,Math.ceil(game.time)),176,18,13,'#f5c84b','center'); text('雷 x'+game.thunderStock,290,18,13,game.thunderStock>0?'#aee8ff':'#7b6b55','center'); if(game.weapon==='spear')text('竹やり '+Math.ceil(game.weaponTimer),290,38,12,'#d9d06b','center'); if(game.stageIntro>0){ px(28,236,304,108,'rgba(18,12,8,.88)'); text(game.stageText,180,284,24,'#f5c84b','center'); text(game.loop+'周目',180,318,17,'#ffffff','center'); } if(game.flash>0){px(0,0,W,H,'rgba(245,245,190,.55)');for(let x=20;x<W;x+=68){px(x,60,8,220,'#fff36d');px(x+8,170,18,8,'#fff36d');px(x+24,178,8,220,'#fff36d')}} if(game.fail>0){text(game.overText,180,320,42,game.candles<=0?'#ff4b32':'#ffffff','center');} }
  function drawTitle(){ drawBg(); px(0,0,W,H,'rgba(0,0,0,.24)'); for(let i=0;i<5;i++){px(70+i*52,198,28,22,'#3a1c12');px(78+i*52,181,8,22,'#ff5a2b');px(80+i*52,174,4,12,'#f9f36d');} text('農民一揆',180,92,42,'#f5c84b','center'); text('N O U M I N   I K K I',180,122,13,'#fff0b2','center'); const oldX=player.x,oldY=player.y; player.x=180; player.y=255; drawPlayer(); player.x=oldX; player.y=oldY; text('ゲームスタート',180,386,20,Math.floor(performance.now()/360)%2?'#f5c84b':'#ffffff','center'); text('ハイスコア '+game.hi,180,424,16,'#f8e6a6','center'); text('遊び方: 左右移動 / 防御連打5回で雷',180,462,13,'#d9c06b','center'); text('画面タップ または Enter',180,510,14,'#ffffff','center'); }
  function drawGameOver(){ render(); px(22,208,316,180,'rgba(18,12,8,.88)'); text('ゲームオーバー',180,260,32,'#ff4b32','center'); text('SCORE '+game.score,180,304,18,'#f8e6a6','center'); text('Enter / Tap でタイトル',180,348,15,'#f5c84b','center'); }
  function drawComplete(){ drawBg(); text('完全クリア',180,214,38,'#f5c84b','center'); text('農村は守られた',180,270,20,'#ffffff','center'); text('SCORE '+game.score,180,316,18,'#f8e6a6','center'); text('Enter / Tap でタイトル',180,372,15,'#f5c84b','center'); }
  function loop(now){ const dt=Math.min(.033,(now-last)/1000); last=now; pauseBtn.style.display=(game.mode==='play'||game.mode==='paused')?'grid':'none'; if(game.mode!=='paused')update(dt); if(game.mode==='title')drawTitle(); else if(game.mode==='gameover')drawGameOver(); else if(game.mode==='complete')drawComplete(); else render(); requestAnimationFrame(loop); }
  function setPaused(on){ pauseMenu.classList.toggle('show',on); pauseBtn.textContent=on?'▶':'II'; pauseBtn.setAttribute('aria-label',on?'再開':'一時停止'); }
  function pauseGame(){ if(game.mode!=='play')return; game.mode='paused'; setPaused(true); }
  function resumeGame(){ if(game.mode!=='paused')return; game.mode='play'; setPaused(false); last=performance.now(); }
  function backToTitle(){ enemies.length=shots.length=enemyShots.length=items.length=sparks.length=0; player.touchX=null; game.shake=0; game.fail=0; game.mode='title'; setPaused(false); }
  function startOrBack(){ initAudio(); if(game.audio?.state==='suspended')game.audio.resume(); if(game.mode==='title')newRun(); else if(game.mode==='gameover'||game.mode==='complete')game.mode='title'; }
  addEventListener('keydown',e=>{ if(e.key==='ArrowLeft')keys.left=true; if(e.key==='ArrowRight')keys.right=true; if(e.code==='Space'&&!keys.guard&&game.mode==='play'){keys.guard=true;tapGuard();} if(e.key==='Enter')startOrBack(); if(e.key==='Escape'){ game.mode==='paused'?resumeGame():pauseGame(); } });
  addEventListener('keyup',e=>{ if(e.key==='ArrowLeft')keys.left=false; if(e.key==='ArrowRight')keys.right=false; if(e.code==='Space')keys.guard=false; });
  function canvasGameX(e){ const r=canvas.getBoundingClientRect(); return clamp((e.clientX-r.left)*W/r.width,28,332); }
  canvas.addEventListener('pointerdown',e=>{ e.preventDefault(); if(game.mode==='play'){ player.touchX=canvasGameX(e); canvas.setPointerCapture?.(e.pointerId); return; } if(game.mode!=='paused')startOrBack(); });
  canvas.addEventListener('pointermove',e=>{ if(game.mode==='play'&&player.touchX!=null){ e.preventDefault(); player.touchX=canvasGameX(e); } });
  canvas.addEventListener('pointerup',e=>{ if(player.touchX!=null){ e.preventDefault(); player.touchX=null; } });
  canvas.addEventListener('pointercancel',()=>{ player.touchX=null; });
  canvas.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('contextmenu',e=>{ if(e.target.closest('#wrap')) e.preventDefault(); });
  pauseBtn.addEventListener('pointerdown',e=>{e.preventDefault(); initAudio(); game.mode==='paused'?resumeGame():pauseGame();});
  resumeBtn.addEventListener('pointerdown',e=>{e.preventDefault(); resumeGame();});
  titleBtn.addEventListener('pointerdown',e=>{e.preventDefault(); backToTitle();}); ['left','right','guard'].forEach(id=>{ const el=document.getElementById(id); const set=v=>{keys[id]=v;el.classList.toggle('down',v); if(id==='guard'&&v)tapGuard();}; el.addEventListener('pointerdown',e=>{e.preventDefault();set(true);initAudio();}); el.addEventListener('pointerup',e=>{e.preventDefault();set(false);}); el.addEventListener('pointercancel',()=>set(false)); el.addEventListener('pointerleave',()=>set(false)); });
  requestAnimationFrame(loop);
})();
</script>
